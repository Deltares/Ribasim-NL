name: Python Lint
on:
  push:
    branches: [main]
    paths-ignore: [".teamcity/**"]
    tags: ["*"]
  pull_request:
  merge_group:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
      - name: Install the project
        run: uv sync --locked
      - name: Fix baseline paths for Linux
        # Workaround: baseline.json is generated on Windows with backslash paths.
        # Remove after https://github.com/facebook/pyrefly/pull/3007 is released and baseline is regenerated.
        if: runner.os == 'Linux'
        run: sed -i 's|\\\\|/|g' baseline.json
      - name: Run prek
        run: uv run prek run --all-files
