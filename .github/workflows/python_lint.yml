name: Python Lint
on:
  push:
    branches: [main]
    paths-ignore: [".teamcity/**"]
    tags: ["*"]
  pull_request:
  merge_group:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.3"
      - name: Install the project
        run: uv sync --locked
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
      - name: Run mypy on hydamo
        run: uv run mypy --ignore-missing-imports src/hydamo
      - name: Run mypy on ribasim_nl
        run: uv run mypy --ignore-missing-imports src/ribasim_nl
      - name: Run mypy on peilbeheerst_model
        run: uv run mypy --ignore-missing-imports src/peilbeheerst_model
      - name: Run mypy on bokeh_helpers
        run: uv run mypy --ignore-missing-imports src/bokeh_helpers
