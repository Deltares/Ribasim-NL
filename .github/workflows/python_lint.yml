name: Python Lint
on:
  push:
    branches: [main]
    paths-ignore: [".teamcity/**"]
    tags: ["*"]
  pull_request:
  merge_group:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.7"
      - name: Install the project
        run: uv sync --locked
      - name: Fix baseline paths for Linux
        # Workaround: baseline.json is generated on Windows with backslash paths.
        # Remove after https://github.com/facebook/pyrefly/pull/3007 is released and baseline is regenerated.
        if: runner.os == 'Linux'
        run: sed -i 's|\\\\|/|g' baseline.json
      - name: Run prek
        run: uv run prek run --all-files
