name: Prek
on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: "latest"
      - name: Fix baseline paths for Linux
        # Workaround: baseline.json is generated on Windows with backslash paths.
        # Remove after https://github.com/facebook/pyrefly/pull/3007 is released and baseline is regenerated.
        if: runner.os == 'Linux'
        run: sed -i 's|\\\\|/|g' baseline.json
      - name: Install prek hooks
        run: pixi run prek install -f
      - name: Run prek on all files
        run: pixi run check
