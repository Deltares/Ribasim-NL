name: Prek auto update
on:
  schedule:
    # At 03:00 on day 3 of the month
    - cron: "0 3 3 * *"
  # on demand

  workflow_dispatch:
jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
      - name: Install the project
        run: uv sync --locked
      - name: Update hook revisions
        run: |
          uv run prek auto-update
      - name: Run prek on all files
        run: |
          uv run prek run --all-files
        continue-on-error: true
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CI_PR_PAT }}
          branch: update/pre-commit
          title: Update git hooks
          commit-message: "Update git hooks"
          author: "GitHub <noreply@github.com>"
          delete-branch: true
