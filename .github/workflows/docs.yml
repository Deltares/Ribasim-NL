name: Docs
on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  publish:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure Git for quarto-publish
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Propagate git credentials for v6
        run: |
          # Propagate git credentials to worktrees (required for actions/checkout@v6)
          # See: https://github.com/quarto-dev/quarto-actions/issues/133
          if git config get includeIf.gitdir:"$(git rev-parse --path-format=absolute --git-dir)".path &>/dev/null; then
            GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)
            CRED_PATH=$(git config get --path includeIf.gitdir:"${GIT_DIR}".path)
            git config set --path includeIf.gitdir:"${GIT_DIR}/worktrees/*".path "${CRED_PATH}"
          fi
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          pixi-version: "latest"
      - name: Check Quarto installation and all engines
        run: pixi run quarto check all
      - name: Build API documentation
        run: pixi run quartodoc build
        working-directory: docs
      - name: Clean up API documentation file
        run: rm docs/objects.json
      - name: Render Quarto Project
        run: pixi run quarto render docs --to html --execute
      - name: Publish Quarto Project
        if: github.ref == 'refs/heads/main'
        run: pixi run quarto publish gh-pages --no-render --no-prompt --no-browser
        working-directory: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
