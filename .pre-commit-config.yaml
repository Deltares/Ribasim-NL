repos:
  - repo: https://github.com/iterative/dvc
    rev: 3.67.1
    hooks:
      - id: dvc-pre-commit
        additional_dependencies:
          - .[all]
        language_version: python3
        stages:
          - pre-commit
      - id: dvc-pre-push
        additional_dependencies:
          - .[all]
        language_version: python3
        stages:
          - pre-push
      - id: dvc-post-checkout
        additional_dependencies:
          - .[all]
        language_version: python3
        stages:
          - post-checkout
        always_run: true
  - repo: builtin
    hooks:
      - id: check-added-large-files
        args: [--maxkb=700]
        exclude: baseline\.json
      - id: check-case-conflict
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: .teamcity
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        description: Lint Python code and auto-fix issues
        entry: pixi run ruff check --force-exclude
        args: [--fix, --exit-non-zero-on-fix]
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        description: Format Python code
        entry: pixi run ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: nbstripout
        name: nbstripout
        description: Strip Jupyter notebook outputs
        entry: pixi run nbstripout
        language: system
        types: [jupyter]
      - id: pyrefly-check
        name: Pyrefly (type checking)
        entry: pixi run typecheck
        pass_filenames: false
        language: system
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
